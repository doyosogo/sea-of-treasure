services:
  postgres:
    image: postgres:16
    container_name: sea-of-treasure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sea_of_treasure
      POSTGRES_USER: sea_user
      POSTGRES_PASSWORD: sea_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sea-of-treasure-server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://sea_user:sea_password@postgres:5432/sea_of_treasure?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      PORT: 3001
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    command: ["npm", "start"]

volumes:
  postgres_data:
