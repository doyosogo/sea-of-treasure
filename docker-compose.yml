services:
  postgres:
    image: postgres:16
    container_name: sea-of-treasure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sea_of_treasure
      POSTGRES_USER: sea_user
      POSTGRES_PASSWORD: sea_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sea_user -d sea_of_treasure"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sea-of-treasure-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sea_user:sea_password@postgres:5432/sea_of_treasure?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      PORT: 3001
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    command: ["npm", "start"]
    healthcheck:
      test: ["CMD", "node", "--input-type=module", "-e", "const response = await fetch('http://localhost:3001/api/health'); process.exit(response.ok ? 0 : 1);"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
